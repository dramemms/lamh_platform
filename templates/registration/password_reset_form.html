{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

    <h2>Mot de passe oublié</h2>

    <p>
        Entrez votre adresse email pour recevoir un lien de réinitialisation.
    </p>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" class="btn btn-danger">
            Envoyer le lien
        </button>
    </form>

</div>

{% endblock %}
