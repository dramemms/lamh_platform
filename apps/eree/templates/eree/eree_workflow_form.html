{% extends "base.html" %}
{% block title %}Workflow EREE{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="card shadow-sm">
        <div class="card-body">
            <h3>Workflow EREE : {{ session.reference }}</h3>

            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags|default:'info' }} mb-3">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <form method="post">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label fw-bold">Motif de rejet / retour</label>
                    <textarea name="reason" rows="4" class="form-control" required></textarea>
                </div>

                <button type="submit" class="btn btn-danger">✔ Valider</button>
                <a href="{% url 'eree_detail' session.pk %}" class="btn btn-outline-secondary">
                    Annuler
                </a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
