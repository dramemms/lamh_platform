{% extends "base.html" %}
{% block title %}Créer un utilisateur{% endblock %}

{% block content %}
<div class="admin-page">
    <div class="form-card">
        <h1>Créer un utilisateur</h1>
        <p>Un mot de passe temporaire sera généré automatiquement et envoyé par email.</p>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}

            <button type="submit" class="btn-primary">Créer l’utilisateur</button>
            <a href="{% url 'admin_users' %}" class="btn-secondary">Annuler</a>
        </form>
    </div>
</div>
{% endblock %}
