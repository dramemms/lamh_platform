{% extends "base.html" %}

{% block title %}Changer mot de passe{% endblock %}

{% block content %}

<div class="container py-5" style="max-width:600px;">

    <div class="card shadow-sm border-0 rounded-4">

        <div class="card-body p-4">

            <h2 class="mb-4">
                Changer le mot de passe
            </h2>

            <form method="post">

                {% csrf_token %}

                {{ form.as_p }}

                <button type="submit"
                        class="btn btn-danger">
                    Enregistrer
                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
