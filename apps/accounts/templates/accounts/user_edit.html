{% extends "base.html" %}
{% block title %}Modifier utilisateur{% endblock %}

{% block content %}
<div class="admin-page">
    <div class="form-card">
        <h1>Modifier : {{ user_obj.username }}</h1>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}

            <button type="submit" class="btn-primary">Enregistrer</button>
            <a href="{% url 'admin_users' %}" class="btn-secondary">Annuler</a>
        </form>
    </div>
</div>
{% endblock %}
