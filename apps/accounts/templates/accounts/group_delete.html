{% extends "base.html" %}
{% block title %}Supprimer groupe{% endblock %}

{% block content %}

<div class="admin-page">

    <div class="confirm-card">

        <h1>Supprimer le groupe</h1>

        <p>
            Voulez-vous vraiment supprimer le groupe
            <strong>{{ access_group.group.name }}</strong> ?
        </p>

        <p>
            Cette action retirera aussi ce groupe des utilisateurs associés.
        </p>

        <form method="post">
            {% csrf_token %}

            <button type="submit" class="btn btn-danger">
                Oui, supprimer
            </button>

            <a href="{% url 'admin_groups' %}" class="btn btn-secondary">
                Annuler
            </a>
        </form>

    </div>

</div>

{% endblock %}
