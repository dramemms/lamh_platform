{% extends "base.html" %}
{% load static %}

{% block title %}Carte victimes par cercle{% endblock %}

{% block content %}

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">

<style>
body { background:#eef1f4; }

.map-page {
  padding: 14px 18px;
}

.map-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.map-title {
  font-size: 30px;
  font-weight: 900;
  color: #0b1f3a;
}

.map-actions {
  display: flex;
  gap: 10px;
  align-items: center;
}

.red-line {
  height: 5px;
  background: #7b1f28;
  margin: 8px 0 12px;
}

.map-layout {
  display: grid;
  grid-template-columns: 260px 1fr;
  gap: 14px;
}

.filter-panel {
  background: #fff;
  padding: 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,.08);
}

.filter-group {
  margin-bottom: 16px;
}

.filter-group label {
  display: block;
  font-weight: 800;
  margin-bottom: 6px;
  color: #a12d37;
}

.filter-group select {
  width: 100%;
  height: 38px;
}

.apply-btn {
  width: 100%;
  background: #7b1f28;
  color: #fff;
  padding: 12px;
  border: none;
  font-weight: 900;
  border-radius: 6px;
  text-decoration: none;
  text-align: center;
}

.reset-btn {
  display: block;
  width: 100%;
  margin-top: 10px;
  text-align: center;
  padding: 10px;
  background: #f3f3ef;
  text-decoration: none;
  font-weight: 800;
  color: #555;
}

.export-image-btn {
  background: #198754;
  color: #fff;
  padding: 12px 16px;
  border: none;
  font-weight: 900;
  border-radius: 6px;
  cursor: pointer;
}

.map-main {
  display: grid;
  grid-template-rows: 100px 1fr;
  gap: 10px;
}

#victimMap {
  height: 600px;
}
</style>

<div class="map-page" id="map-export-content">

<div class="map-top">
  <div class="map-title">Carte des victimes par cercle</div>

  <div class="map-actions">
    <button type="button" onclick="exportVictimMapImage()" class="export-image-btn">
      Exporter en image
    </button>

    <a href="{% url 'victim_dashboard' %}" class="apply-btn" style="width:auto;">
      ← Retour
    </a>
  </div>
</div>

<div class="red-line"></div>

<div class="map-layout">

<aside class="filter-panel">
<form method="get">

<div class="filter-group">
<label>Organisation</label>
<select name="organisation">
<option value="">Tout</option>
{% for org in organisations %}
<option value="{{ org }}" {% if selected_organisation == org %}selected{% endif %}>
{{ org }}
</option>
{% endfor %}
</select>
</div>

<div class="filter-group">
<label>Type d'accident</label>
<select name="accident_type">
<option value="">Tout</option>
{% for t in accident_types %}
<option value="{{ t }}" {% if selected_accident_type == t %}selected{% endif %}>
{{ t }}
</option>
{% endfor %}
</select>
</div>

<div class="filter-group">
<label>Cercle</label>
<select name="cercle">
<option value="">Tout</option>
{% for c in cercles %}
<option value="{{ c.cercle_id }}" {% if selected_cercle == c.cercle_id|stringformat:"s" %}selected{% endif %}>
{{ c.cercle__name }}
</option>
{% endfor %}
</select>
</div>

<div class="filter-group">
<label>Commune</label>
<select name="commune">
<option value="">Tout</option>
{% for c in communes %}
<option value="{{ c.commune_id }}" {% if selected_commune == c.commune_id|stringformat:"s" %}selected{% endif %}>
{{ c.commune__name }}
</option>
{% endfor %}
</select>
</div>

<button type="submit" class="apply-btn">Appliquer filtre</button>

<a href="{{ request.path }}" class="reset-btn">
Effacer tous les filtres
</a>

</form>
</aside>

<main class="map-main">
<div id="victimMap"></div>
</main>

</div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
const mapData = {{ map_data_json|safe }};

const map = L.map("victimMap").setView([14.5, -3.5], 6);

L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", {
  attribution: "&copy; OpenStreetMap &copy; CartoDB",
  subdomains: "abcd",
  maxZoom: 19
}).addTo(map);

const heatPoints = [];

mapData.forEach(item => {
  if (!item.lat || !item.lng) return;

  heatPoints.push([item.lat, item.lng, item.count]);

  L.circleMarker([item.lat, item.lng], {
    radius: Math.max(10, item.count * 6),
    color: "#4b2c8f",
    fillColor: "#8f6bd8",
    fillOpacity: 0.6
  })
  .bindPopup(
    "<b>Cercle :</b> " + item.cercle +
    "<br><b>Victimes :</b> " + item.count
  )
  .addTo(map);
});

if (heatPoints.length > 0) {
  L.heatLayer(heatPoints, {
    radius: 35,
    blur: 25
  }).addTo(map);
}

const valid = mapData.filter(i => i.lat && i.lng);

if (valid.length > 0) {
  const bounds = L.latLngBounds(valid.map(i => [i.lat, i.lng]));
  map.fitBounds(bounds);
}

// ================= EXPORT IMAGE =================
function exportVictimMapImage() {
  const content = document.getElementById("map-export-content");
  const actions = document.querySelector(".map-actions");

  if (actions) actions.style.display = "none";

  map.invalidateSize();

  setTimeout(function () {
    html2canvas(content, {
      scale: 2,
      useCORS: true,
      allowTaint: true,
      backgroundColor: "#ffffff",
      windowWidth: document.body.scrollWidth,
      windowHeight: document.body.scrollHeight,
      scrollY: -window.scrollY
    }).then(function(canvas) {

      const link = document.createElement("a");
      link.download = "carte_victimes.png";
      link.href = canvas.toDataURL("image/png");
      link.click();

      if (actions) actions.style.display = "flex";
    });
  }, 400);
}
</script>

{% endblock %}
